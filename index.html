<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2048: Glassmorphism</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>
<!-- /comment -->
    <div class="game-wrapper">
        <header>
            <div class="title-container">
                <h1>2048</h1>
                <p>Join the numbers to reach the <strong>2048</strong> tile!</p>
            </div>
            <div class="scores-container">
                <div class="score-box">
                    <span class="score-label">SCORE</span>
                    <span class="score-value" id="score">0</span>
                </div>
                <div class="score-box" id="best-score-box">
                    <span class="score-label">BEST</span>
                    <span class="score-value" id="best-score">0</span>
                </div>
                <div class="score-box timer-box">
                    <span class="score-label">TIME</span>
                    <span class="score-value" id="timer-display">00:00</span>
                </div>
            </div>
        </header>

        <div class="controls-header">
            <button id="undo-btn" class="glass-btn secondary" disabled>Undo</button>
            <button id="new-game-btn" class="glass-btn primary">New Game</button>
        </div>

        <div class="game-container">
            <div class="grid-container" id="grid">
                <!-- Grid Cells (Background) -->
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
            </div>
            
            <div class="tile-container" id="tile-container">
                <!-- Tiles will be generated here by JS -->
            </div>

            <div class="game-message hidden" id="game-message">
                <h2 id="message-text">Game Over!</h2>
                <div class="message-actions">
                    <button id="retry-btn" class="glass-btn primary">Try Again</button>
                </div>
            </div>
        </div>
        
        <div class="instructions">
            <p><strong>HOW TO PLAY:</strong> Use your <strong>arrow keys</strong> or <strong>swipe</strong> to move the tiles. Tiles with the same number merge into one when they touch. Add them up to reach <strong>2048!</strong></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
